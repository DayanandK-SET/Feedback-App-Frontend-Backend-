<nav class="navbar">

  <div class="navbar-left">
    <button class="hamburger" (click)="toggleMenu()">☰</button>
    <div class="logo">FeedbackApp</div>
  </div>

  <ul class="nav-links" [class.open]="menuOpen()">

    <!-- Creator + Admin links -->
    <li><a routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a></li>
    <li><a routerLink="/create-survey" routerLinkActive="active-link">Create Survey</a></li>
    <li><a routerLink="/question-bank" routerLinkActive="active-link">Question Bank</a></li>

    <!-- Admin-only link -->
    <li *ngIf="isAdmin">
      <a routerLink="/admin" routerLinkActive="active-link" class="admin-link">
        ⚙️ Admin
      </a>
    </li>

  </ul>

  <div class="user-section">
    <span class="welcome">Welcome, {{ username() }}</span>
    <button class="logout" (click)="logout()">Logout</button>
  </div>

</nav>
